<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
        display: none;
            }

            .popup {
                left: 30%;
                border-radius: 10px;
                position: absolute;
                background-color: white;
                color: black;
                display: none;
                width: 60%;
                top: 10px;
                height: 30%;
                /* padding: 40px; */
                text-align: center;

            }
    </style>
    <button id="openBtn" onclick="show()">Open Popup</button>
    <div class="overlay">
        <div class="popup">
            <h2>Popup Title</h2>
            <p>This is a popup message.</p>
            <button id="closeBtn" onclick="hide()">Close</button>
        </div>
    </div>
    <script>
        function show() {
            var overlay = document.querySelector('.overlay');
            var popup = document.querySelector('.popup');
            overlay.style.display = 'block';
            popup.style.display = 'block';
        }

        function hide() {
            var overlay = document.querySelector('.overlay');
            var popup = document.querySelector('.popup');
            overlay.style.display = 'none';
            popup.style.display = 'none';
        }
    </script>
</body>
</html>
