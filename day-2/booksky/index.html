<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="navbar">
        <h1 class="poppins">Booksky</h1>
    </div>
    <div class="overlay">
            <div class="popup">
                <form id="book-form">
                    <h1>Add Book</h1>
                    <input type="text" placeholder="Book Title" id="book-title">

                    <input type="text" placeholder="Author" id="book-author">
                    <textarea placeholder="Description" id="book-description"></textarea>
                    <button class="submit-btn">Add Book</button>
                    <button class="close-btn">Close</button>
                </form>
            </div>

        </div>
    <div class="container">  
        <div class="book-card">
            <h2 class="poppins">To Kill a Mockingbird</h2>
            <h2>Author</h2>
            <p class="poppins-thin">Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus dolores debitis corrupti aliquid reprehenderit quam, adipisci fuga minus aliquam doloribus officia, ullam cumque atque laudantium unde voluptate eos natus pariatur?</p>
            <button class="delete-btn" onclick="deleteBook(event)">Delete</button>
        </div>
        </div>
<button class="add-btn">+</button>
</body>
</html>
